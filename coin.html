<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coin Flipper</title>
    <link rel="stylesheet" href="style.css">
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.183.2/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.183.2/examples/jsm/"
        }
    }
    </script>
    <style>
        html, body {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }
        #canvas { display: block; width: 100%; height: 100%; touch-action: none; }

        #ui {
            position: fixed; inset: 0; pointer-events: none;
            display: flex; flex-direction: column;
            align-items: center; justify-content: flex-end;
            padding: 0 1rem 2.5rem; gap: 1rem;
        }
        #result {
            font-size: 2.5rem; font-weight: bold;
            color: var(--accent); letter-spacing: 0.05em;
            opacity: 0; transform: translateY(8px);
            transition: opacity 0.4s, transform 0.4s;
            min-height: 3rem;
        }
        #result.show { opacity: 1; transform: none; }

        #flip-btn {
            pointer-events: all; background: none;
            border: 1px solid var(--accent); border-radius: 20px;
            padding: 0.6rem 2.5rem; font-size: 1rem;
            color: var(--accent); cursor: pointer; font-family: inherit;
            transition: border-color 0.2s, color 0.2s;
        }
        #flip-btn:hover:not(:disabled) { border-color: var(--text); color: var(--text); }
        #flip-btn:disabled { opacity: 0.4; cursor: default; }

        .back-link {
            position: fixed; top: 1rem; left: 1rem; pointer-events: all;
            color: var(--accent); text-decoration: none; font-size: 0.9rem;
            background: var(--surface); padding: 0.35rem 0.9rem;
            border-radius: 20px; border: 1px solid var(--border);
            font-family: inherit; transition: color 0.2s, border-color 0.2s;
        }
        .back-link:hover { color: var(--text); border-color: var(--accent); }
    </style>
</head>
<body>
    <script>if(localStorage.getItem('theme')==='dark')document.body.classList.add('dark');</script>
    <canvas id="canvas"></canvas>
    <div id="ui">
        <div id="result"></div>
        <button id="flip-btn" disabled>Loading…</button>
    </div>
    <a class="back-link" href="utils.html">← Utils</a>

    <script type="module">
        import * as THREE from 'three';
        import { USDZLoader } from 'three/addons/loaders/USDZLoader.js';
        import * as RAPIER from 'https://cdn.jsdelivr.net/npm/@dimforge/rapier3d-compat@0.12.0/rapier.es.js';

        await RAPIER.init();

        // ── Tunable parameters ────────────────────────────────────────────────────
        const COIN_FLIP_PARAMS = {
            // Coin geometry
            radius:        0.48,
            halfHeight:    0.038,
            // Physics world
            gravity:       -18,
            restitution:   0.25,
            friction:      0.8,
            // Launch — linear velocity
            launchYMin:    12,
            launchYRange:  4,
            launchDriftXZ: 1.5,
            // Launch — angular velocity
            spinMin:       22,
            spinRange:     14,
            spinYawSpread: 3,    // random Y (top-spin) magnitude
            // Initial tilt randomness (radians)
            tiltMax:       0.4,
            // Settle detection thresholds
            settleLinvel:  0.5,
            settleAngvel:  1.0,
            settleYClear:  0.08, // how far above ground counts as "landed"
            settleDelay:   0.5,  // seconds before declaring result
        };

        const dark = document.body.classList.contains('dark');
        const canvas = document.getElementById('canvas');
        const flipBtn = document.getElementById('flip-btn');
        const resultEl = document.getElementById('result');

        // ── Renderer ─────────────────────────────────────────────────────────────
        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
        renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.outputColorSpace = THREE.SRGBColorSpace;

        // ── Scene + camera ────────────────────────────────────────────────────────
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(dark ? '#100f1a' : '#F4F0F4');

        const camera = new THREE.PerspectiveCamera(42, 1, 0.01, 50);
        camera.position.set(0, 7.8, 5.8);
        camera.lookAt(0, 0.4, 0);

        const CAM_HOME     = new THREE.Vector3(0, 0.4, 0);    // default look-at
        const CAM_BASE_OFF = new THREE.Vector3(0, 7.4, 5.8); // camera offset from look-at at zoom=1
        const camTarget    = CAM_HOME.clone();                // current look-at (tracked)
        let camZoom = 1, camZoomTarget = 1;
        const _coinNDC = new THREE.Vector3();

        // ── Lighting ─────────────────────────────────────────────────────────────
        scene.add(new THREE.AmbientLight(0xffffff, dark ? 0.5 : 0.7));

        const sun = new THREE.DirectionalLight(0xffffff, dark ? 1.5 : 1.2);
        sun.position.set(4, 10, 5);
        sun.castShadow = true;
        sun.shadow.mapSize.set(2048, 2048);
        sun.shadow.camera.near = 1;
        sun.shadow.camera.far = 40;
        sun.shadow.camera.left = sun.shadow.camera.bottom = -4;
        sun.shadow.camera.right = sun.shadow.camera.top = 4;
        scene.add(sun);

        const fill = new THREE.DirectionalLight(dark ? 0x9b8bbb : 0xfff0e8, 0.4);
        fill.position.set(-4, 2, -3);
        scene.add(fill);

        // ── Ground ────────────────────────────────────────────────────────────────
        const floor = new THREE.Mesh(
            new THREE.CircleGeometry(5, 72),
            new THREE.MeshStandardMaterial({ color: dark ? 0x1c1b2a : 0xe8e4f0, roughness: 0.9 })
        );
        floor.rotation.x = -Math.PI / 2;
        floor.receiveShadow = true;
        scene.add(floor);

        // ── Physics ───────────────────────────────────────────────────────────────
        const world = new RAPIER.World({ x: 0, y: COIN_FLIP_PARAMS.gravity, z: 0 });
        // Ground body shifted down so top surface sits at y=0; thick enough to prevent tunneling
        const groundBody = world.createRigidBody(RAPIER.RigidBodyDesc.fixed().setTranslation(0, -0.5, 0));
        world.createCollider(RAPIER.ColliderDesc.cuboid(10, 0.5, 10), groundBody);

        const { radius: R, halfHeight: HH } = COIN_FLIP_PARAMS;

        // ── Fallback procedural coin ──────────────────────────────────────────────
        function makeFallback() {
            const g = new THREE.Group();
            g.add(new THREE.Mesh(
                new THREE.CylinderGeometry(R, R, HH * 2, 64),
                new THREE.MeshStandardMaterial({ color: 0xd4af37, metalness: 0.85, roughness: 0.25 })
            ));
            const rim = new THREE.Mesh(
                new THREE.TorusGeometry(R, HH * 0.85, 8, 64),
                new THREE.MeshStandardMaterial({ color: 0xb89010, metalness: 0.9, roughness: 0.3 })
            );
            rim.rotation.x = Math.PI / 2;
            g.add(rim);
            return g;
        }

        // ── Load USDZ ─────────────────────────────────────────────────────────────
        let coinModel;
        try {
            coinModel = await new USDZLoader().loadAsync('files/US_quarter.usdz');
            const box = new THREE.Box3().setFromObject(coinModel);
            const size = box.getSize(new THREE.Vector3());
            // Scale so the widest XZ dimension = diameter
            coinModel.scale.setScalar((R * 2) / Math.max(size.x, size.z));
            // Center at origin
            box.setFromObject(coinModel);
            coinModel.position.sub(box.getCenter(new THREE.Vector3()));
        } catch (e) {
            console.warn('USDZLoader failed, using fallback coin:', e);
            coinModel = makeFallback();
        }
        coinModel.traverse(o => { if (o.isMesh) o.castShadow = true; });

        // Pivot — physics body position/rotation drives this group
        const pivot = new THREE.Group();
        pivot.add(coinModel);
        scene.add(pivot);

        // ── Coin physics body (starts fixed, goes dynamic on flip) ────────────────
        const coinBody = world.createRigidBody(
            RAPIER.RigidBodyDesc.fixed().setTranslation(0, HH, 0)
        );
        world.createCollider(
            RAPIER.ColliderDesc.cylinder(HH, R)
                .setRestitution(COIN_FLIP_PARAMS.restitution)
                .setFriction(COIN_FLIP_PARAMS.friction),
            coinBody
        );

        function syncMesh() {
            const t = coinBody.translation();
            const r = coinBody.rotation();
            pivot.position.set(t.x, t.y, t.z);
            pivot.quaternion.set(r.x, r.y, r.z, r.w);
        }
        syncMesh();

        flipBtn.textContent = 'Flip';
        flipBtn.disabled = false;

        // ── Flip ──────────────────────────────────────────────────────────────────
        let state = 'idle';
        let settleTimer = 0;

        function doFlip(gestureVelX = 0, gestureVelY = 0, launchX = 0, launchZ = 0) {
            if (state !== 'idle') return;
            state = 'flipping';
            settleTimer = 0;
            camZoomTarget = 1;
            flipBtn.disabled = true;
            resultEl.classList.remove('show');

            coinBody.setBodyType(RAPIER.RigidBodyType.Dynamic, true);
            coinBody.enableCcd(true);
            coinBody.setTranslation({ x: launchX, y: HH, z: launchZ }, true);

            const p = COIN_FLIP_PARAMS;

            // Swipe-derived boosts (gestureVelY < 0 = swiped up)
            const upward  = Math.max(0, -gestureVelY);          // px/ms, positive = up
            const extraY  = Math.min(upward * 8,  12);          // up to +12 launch height
            const spinBoost = Math.min(upward * 12, 18);        // up to +18 rad/s spin
            const driftX  = Math.max(-3, Math.min(3, gestureVelX * 0.5));

            const tilt = (Math.random() - 0.5) * p.tiltMax;
            const tiltYaw = Math.random() * Math.PI * 2;
            coinBody.setRotation({
                x: Math.sin(tilt) * Math.cos(tiltYaw),
                y: 0,
                z: Math.sin(tilt) * Math.sin(tiltYaw),
                w: Math.cos(tilt),
            }, true);

            coinBody.setLinvel({
                x: (Math.random() - 0.5) * p.launchDriftXZ + driftX,
                y: p.launchYMin + Math.random() * p.launchYRange + extraY,
                z: (Math.random() - 0.5) * p.launchDriftXZ,
            }, true);

            const dir = Math.random() < 0.5 ? 1 : -1;
            const spinYaw = Math.random() * Math.PI * 2;
            const spinSpeed = p.spinMin + Math.random() * p.spinRange + spinBoost;
            coinBody.setAngvel({
                x: dir * spinSpeed * Math.cos(spinYaw),
                y: (Math.random() - 0.5) * p.spinYawSpread,
                z: dir * spinSpeed * Math.sin(spinYaw),
            }, true);
        }

        // ── Button: simple click = default flip ───────────────────────────────────
        flipBtn.addEventListener('click', () => doFlip());

        // ── Canvas swipe gesture ──────────────────────────────────────────────────
        const drag = { active: false, startX: 0, startY: 0, history: [] };
        const DRAG_SCALE = 0.005;  // screen px → world units
        const MAX_OFFSET = 1.2;   // world units clamp

        canvas.addEventListener('pointerdown', (e) => {
            if (state !== 'idle') return;
            canvas.setPointerCapture(e.pointerId);
            drag.active  = true;
            drag.startX  = e.clientX;
            drag.startY  = e.clientY;
            drag.history = [{ x: e.clientX, y: e.clientY, t: performance.now() }];
        });

        canvas.addEventListener('pointermove', (e) => {
            if (!drag.active) return;
            const now = performance.now();
            drag.history.push({ x: e.clientX, y: e.clientY, t: now });
            while (drag.history.length > 1 && now - drag.history[0].t > 80) drag.history.shift();

            const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));
            const wx = clamp((e.clientX - drag.startX) * DRAG_SCALE, -MAX_OFFSET, MAX_OFFSET);
            const wz = clamp((e.clientY - drag.startY) * DRAG_SCALE, -MAX_OFFSET, MAX_OFFSET);
            pivot.position.set(wx, HH, wz);
            coinBody.setTranslation({ x: wx, y: HH, z: wz }, true);
        });

        function onRelease(clientX, clientY) {
            if (!drag.active) return;
            drag.active = false;

            let velX = 0, velY = 0;
            const h = drag.history;
            if (h.length >= 2) {
                const dt = h[h.length - 1].t - h[0].t;
                if (dt > 0) {
                    velX = (h[h.length - 1].x - h[0].x) / dt;
                    velY = (h[h.length - 1].y - h[0].y) / dt;
                }
            }

            const upward = -velY;
            const moved  = Math.hypot(clientX - drag.startX, clientY - drag.startY);
            if (upward > 0.1 || moved > 10) {
                doFlip(velX, velY, pivot.position.x, pivot.position.z);
            } else {
                pivot.position.set(0, HH, 0);
                coinBody.setTranslation({ x: 0, y: HH, z: 0 }, true);
            }
        }

        canvas.addEventListener('pointerup',     (e) => onRelease(e.clientX, e.clientY));
        canvas.addEventListener('pointercancel', (e) => {
            // Browser stole the touch — reset coin without launching
            drag.active = false;
            pivot.position.set(0, HH, 0);
            coinBody.setTranslation({ x: 0, y: HH, z: 0 }, true);
        });

        // ── Result detection ──────────────────────────────────────────────────────
        // Coin's local +Y axis in world space; if pointing world-up → heads face up.
        // Swap 'Heads'/'Tails' here if the model's orientation is reversed.
        function getResult() {
            const localUp = new THREE.Vector3(0, 1, 0).applyQuaternion(pivot.quaternion);
            return localUp.y > 0 ? 'Heads' : 'Tails';
        }

        // ── Resize ────────────────────────────────────────────────────────────────
        function onResize() {
            const w = canvas.clientWidth, h = canvas.clientHeight;
            renderer.setSize(w, h, false);
            camera.aspect = w / h;
            camera.updateProjectionMatrix();
        }
        window.addEventListener('resize', onResize);
        onResize();

        // ── Loop ──────────────────────────────────────────────────────────────────
        const clock = new THREE.Clock();

        (function animate() {
            requestAnimationFrame(animate);
            const dt = Math.min(clock.getDelta(), 1 / 30);

            if (state === 'flipping') {
                world.step();
                syncMesh();

                const pos = coinBody.translation();
                const lv  = coinBody.linvel();
                const av  = coinBody.angvel();
                const { settleLinvel, settleAngvel, settleYClear, settleDelay } = COIN_FLIP_PARAMS;
                const settled = pos.y < HH + settleYClear
                    && Math.hypot(lv.x, lv.y, lv.z) < settleLinvel
                    && Math.hypot(av.x, av.y, av.z) < settleAngvel;

                if (settled) {
                    settleTimer += dt;
                    if (settleTimer > settleDelay) {
                        state = 'idle';
                        coinBody.setBodyType(RAPIER.RigidBodyType.Fixed, true);
                        resultEl.textContent = getResult();
                        resultEl.classList.add('show');
                        flipBtn.disabled = false;
                        flipBtn.textContent = 'Flip again';
                    }
                } else {
                    settleTimer = 0;
                }

                // Follow coin — full X/Z, damped Y so steep launches don't flip the view
                const followY = 0.4 + Math.max(0, pos.y - 1) * 0.35;
                camTarget.lerp({ x: pos.x, y: followY, z: pos.z }, Math.min(dt * 5, 1));

                // Zoom out if coin leaves frame
                _coinNDC.set(pos.x, pos.y, pos.z).project(camera);
                const extent = Math.max(Math.abs(_coinNDC.x), Math.abs(_coinNDC.y));
                const needed = Math.max(1, extent / 0.82);
                if (needed > camZoomTarget) camZoomTarget = needed;
            } else {
                // Settled — ease look-at and zoom back home
                camTarget.lerp(CAM_HOME, Math.min(dt * 2, 1));
                camZoomTarget += (1 - camZoomTarget) * Math.min(dt * 0.8, 1);
            }

            // Smooth camera zoom by scaling offset from look-at point
            camZoom += (camZoomTarget - camZoom) * Math.min(dt * 4, 1);
            camera.position.copy(camTarget).addScaledVector(CAM_BASE_OFF, camZoom);
            camera.lookAt(camTarget);

            renderer.render(scene, camera);
        })();
    </script>
</body>
</html>
